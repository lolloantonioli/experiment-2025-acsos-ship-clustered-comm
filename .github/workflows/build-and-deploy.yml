
name: CI/CD Process
on:
  workflow_call:
  workflow_dispatch:

jobs:
  check-simulations-native:
    strategy:
      matrix:
        os: [ windows-2025, macos-15, ubuntu-24.04 ]
    runs-on: ${{ matrix.os }}
    concurrency:
      group: sim-check${{ github.workflow }}${{ matrix.os }}${{ github.event.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: DanySK/build-check-deploy-gradle-action@4.0.15
        env:
          CI: true
        with:
          build-command: true
          check-command: ./gradlew check runAllGraphic
          deploy-command: true
          should-run-codecov: false
          should-validate-wrapper: ${{ contains('Linux', runner.os) }}
  create-charts:
    runs-on: ubuntu-24.04
    concurrency:
      group: charts${{ github.workflow }}${{ matrix.os }}${{ github.event.number || github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install python
        uses: actions/setup-python@v6.1.0
      - name: Upgrade pip
        run: pip install --upgrade pip --user
      - name: Install requirements
        run: pip install -r requirements.txt --user
      - name: Prepare charts folder
        run: mkdir -p charts
      - name: Generate charts
        run: python process.py
      - name: Generate archive
        run: tar --use-compress-program zstd -cf charts.tar.zst charts/
      - name: Upload charts
        uses: actions/upload-artifact@v5.0.0
        with:
          name: charts
          path: charts.tar.zst
  #  check-simulations-docker:
  #    runs-on: ubuntu-24.04
  #    concurrency:
  #      group: container-check${{ github.workflow }}${{ matrix.os }}${{ github.event.number || github.ref }}
  #      cancel-in-progress: true
  #    steps:
  #    - name: Checkout
  #      uses: actions/checkout@9bb56186c3b09b4f86b1c65136769dd318469633 # v4.1.2
  #    - name: Run compose
  #      run: docker-compose up --build
  release:
    needs:
      - check-simulations-native
      #      - check-simulations-docker
      - create-charts
    runs-on: ubuntu-24.04
    concurrency:
      # Only one release job at a time per branch, as only master releases.
      group: release-${{ github.event.number || github.ref }}
    if: >-
      !github.event.repository.fork
      && (
        github.event_name != 'pull_request'
        || github.event.pull_request.head.repo.full_name == github.repository
      )
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download charts artifact
        uses: actions/download-artifact@v6.0.0
        with:
          name: charts
      - name: Find the version of Node from package.json
        id: node-version
        run: echo "version=$(jq -r .engines.node package.json)" >> $GITHUB_OUTPUT
      - name: Install Node
        uses: actions/setup-node@v6.1.0
        with:
          node-version: ${{ steps.node-version.outputs.version }}
      - name: Login to dockerhub
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_USERNAME: anitvam
        run: echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin docker.io
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
        run: |
          npm install
          npx semantic-release
  success:
    runs-on: ubuntu-24.04
    needs:
      - create-charts
      - check-simulations-native
      #      - check-simulations-docker
      - release
    if: >-
      always() && (
        contains(join(needs.*.result, ','), 'failure')
        || !contains(join(needs.*.result, ','), 'cancelled')
      )
    steps:
      - name: Verify that there were no failures
        run: ${{ !contains(join(needs.*.result, ','), 'failure') }}
